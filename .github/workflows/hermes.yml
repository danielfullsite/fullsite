name: Hermes — Agent Improvement System

on:
  schedule:
    # Runs every 2 hours during operations (8am-10pm MX)
    - cron: '0 14,16,18,20,22,0,2,4 * * *'
  workflow_dispatch:
    inputs:
      client_id:
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  TRIGGER_TYPE: ${{ github.event_name }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python .github/scripts/hermes_agent.py
