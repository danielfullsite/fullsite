name: Reservas Pendientes AMALAY

on:
  # schedule:
  #   - cron: '0 16 * * *'   # 10am MX (UTC-6) — DISABLED: Daniel doesn't want these alerts
  workflow_dispatch:
    inputs:
      client_id:
        description: "Client ID"
        required: false
        default: "amalay"

jobs:
  alertas:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run reservas-pendientes
        env:
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
          TRIGGER_TYPE:            ${{ github.event_name }}
        run: python .github/scripts/reservas_pendientes.py
