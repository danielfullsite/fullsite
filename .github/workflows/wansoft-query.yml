name: Wansoft Query

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'User question about Wansoft data'
        required: false
        default: ''
      chat_id:
        description: 'Telegram chat ID to reply to'
        required: false
        default: ''

env:
  WANSOFT_USER: ${{ secrets.WANSOFT_USER }}
  WANSOFT_PASS: ${{ secrets.WANSOFT_PASS }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  INPUT_MESSAGE: ${{ github.event.inputs.message }}
  INPUT_CHAT_ID: ${{ github.event.inputs.chat_id }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Wansoft Query
        run: python .github/scripts/wansoft_query.py
