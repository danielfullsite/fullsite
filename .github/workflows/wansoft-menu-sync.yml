name: Wansoft Menu Sync

on:
  schedule:
    # Sundays 6am MX = 12:00 UTC (weekly menu config sync)
    - cron: '0 12 * * 0'
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID'
        required: false
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  menu-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Wansoft Menu Sync
        run: python .github/scripts/wansoft_menu_sync.py
