name: Send Prospect Emails

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to CSV file (relative to repo root) with columns: name, restaurant, email. Leave empty to use hardcoded list.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — log but do not actually send emails'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  send-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send prospect emails
        env:
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          CSV_PATH:               ${{ github.event.inputs.csv_path }}
          DRY_RUN:                ${{ github.event.inputs.dry_run }}
        run: python .github/scripts/send_prospect_emails.py
