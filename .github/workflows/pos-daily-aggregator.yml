name: POS Daily Aggregator

on:
  schedule:
    # Cierre 11pm MX = 05:00 UTC (+1 day)
    # 3pm avance REMOVED: partial aggregates must not be published as record_type='cierre'.
    # Intraday data is served by pos_intraday_snapshot (record_type='snapshot').
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date (YYYY-MM-DD)'
        required: false

defaults:
  run:
    working-directory: .github/scripts

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  TRIGGER_TYPE: ${{ github.event_name }}
  TARGET_DATE: ${{ github.event.inputs.target_date || '' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install requests pytz
      - run: python pos_daily_aggregator.py
