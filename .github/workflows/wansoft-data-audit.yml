name: Wansoft Data Audit

on:
  workflow_dispatch:
    inputs:
      audit_date:
        description: 'Date to audit (YYYY-MM-DD, default: yesterday)'
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
      TRIGGER_TYPE: ${{ github.event_name }}
      AUDIT_DATE: ${{ github.event.inputs.audit_date }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl
      - name: Run Wansoft Data Audit
        working-directory: .github/scripts
        run: python wansoft_data_audit.py
