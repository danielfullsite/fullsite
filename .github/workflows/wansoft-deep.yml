name: Wansoft Deep Scraper

on:
  schedule:
    # 11pm MX = 05:00+1 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID'
        required: false
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  deep-scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Wansoft Deep Scraper
        run: python .github/scripts/wansoft_deep_scraper.py
