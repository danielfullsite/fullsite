name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Destinatario'
        required: true
        type: choice
        options:
          - daniel
          - monica
          - both
      message:
        description: 'Mensaje (HTML de Telegram: <b>, <i>, saltos de linea con \n)'
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
          CHAT_MONICA: ${{ secrets.TELEGRAM_CHAT_ID_MONICA }}
          TO: ${{ inputs.to }}
          MESSAGE: ${{ inputs.message }}
        run: |
          send() {
            printf '%b' "$MESSAGE" | python3 -c '
          import sys, os, json, urllib.request
          msg = sys.stdin.read()
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = sys.argv[1]
          data = json.dumps({"chat_id": chat_id, "text": msg, "parse_mode": "HTML"}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data, headers={"Content-Type": "application/json"})
          resp = urllib.request.urlopen(req)
          print(resp.status)
          ' "$1"
          }
          if [ "$TO" = "daniel" ] || [ "$TO" = "both" ]; then send "$CHAT_DANIEL"; fi
          if [ "$TO" = "monica" ] || [ "$TO" = "both" ]; then send "$CHAT_MONICA"; fi
