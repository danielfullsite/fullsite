name: Agents — Daily (Kitchen + Table Time + Config Validator)

on:
  schedule:
    # 3pm MX = 21:00 UTC, 4pm = 22:00, 7pm = 01:00+1
    - cron: '0 13 * * *'   # 7am MX — Config Validator
    - cron: '0 22 * * *'   # 4pm MX — Kitchen Quality
    - cron: '0 1 * * *'    # 7pm MX — Table Time
  workflow_dispatch:
    inputs:
      client_id:
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  kitchen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python .github/scripts/kitchen_quality_agent.py

  table-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python .github/scripts/table_time_agent.py

  config-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python .github/scripts/config_validator.py
