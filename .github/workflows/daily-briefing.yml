name: Daily Briefing AMALAY

on:
  schedule:
    - cron: '0 13 * * *'   # 7:00am MX (UTC-6)
  workflow_dispatch:         # trigger manual para testing

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Daily Briefing
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_DANIEL:  ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
          TRIGGER_TYPE:             ${{ github.event_name }}
        run: python .github/scripts/daily_briefing.py
