name: Ticket Detail (Mesero x Categoría)

on:
  schedule:
    # Same cadence as intraday: 1pm, 3pm, 10pm MX
    - cron: '5 19 * * *'    # 1:05 PM MX (5 min after intraday)
    - cron: '5 21 * * *'    # 3:05 PM MX
    - cron: '5 4 * * *'     # 10:05 PM MX
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID'
        required: false
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium
      - name: Run Ticket Detail Scraper
        run: python .github/scripts/ticket_detail_scraper.py
