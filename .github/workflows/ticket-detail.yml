name: Ticket Detail (Mesero x Categoría)

on:
  schedule:
    # Run at 10:30pm MX = 04:30 UTC (after last intraday report)
    - cron: '30 4 * * *'
  workflow_dispatch:

env:
  WANSOFT_USER: ${{ secrets.WANSOFT_USER }}
  WANSOFT_PASS: ${{ secrets.WANSOFT_PASS }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium
      - name: Run Ticket Detail Scraper
        run: python .github/scripts/ticket_detail_scraper.py
