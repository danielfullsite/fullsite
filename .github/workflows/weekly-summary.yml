name: Weekly Summary Report
on:
  schedule:
    - cron: '0 15 * * 1'   # Monday 9am MX (UTC-6)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run Weekly Summary
        working-directory: .github/scripts
        env:
          CLIENT_ID: amalay
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
          TELEGRAM_CHAT_ID_MONICA: ${{ secrets.TELEGRAM_CHAT_ID_MONICA }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGER_TYPE: ${{ github.event_name }}
        run: python weekly_summary.py
