name: Intraday Sales Report

on:
  schedule:
    # Hourly during AMALAY hours: 10am-11pm MX = 16:00-05:00 UTC
    - cron: '0 16,17,18,19,20,21,22,23 * * *'   # 10am-5pm MX
    - cron: '0 0,1,2,3,4 * * *'                   # 6pm-10pm MX
    # Final cierre capture: 11:30pm MX (Thu-Sat close late)
    - cron: '30 5 * * 0,5,6'                      # 11:30pm MX Fri/Sat + Sun morning catchup
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID'
        required: false
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Intraday Sales Report
        run: python .github/scripts/intraday_sales.py
