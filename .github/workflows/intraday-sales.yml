name: Intraday Sales Report

on:
  schedule:
    # Every 30 min during AMALAY hours: 9am-8pm MX = 15:00-02:00 UTC
    - cron: '0,30 15,16,17,18,19,20,21,22,23 * * *'   # 9am-5:30pm MX
    - cron: '0,30 0,1 * * *'                             # 6pm-7:30pm MX
    # Cierre report at 8pm MX (02:00 UTC)
    - cron: '0 2 * * *'                                   # 8pm MX — cierre
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID'
        required: false
        default: 'amalay'

env:
  CLIENT_ID: ${{ github.event.inputs.client_id || 'amalay' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TRIGGER_TYPE: ${{ github.event_name }}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Intraday Sales Report
        run: python .github/scripts/intraday_sales.py
