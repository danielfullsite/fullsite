# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Wansoft Daily Mesero Report — avance (3pm) + cierre (close)          │
# │                                                                        │
# │  Mónica gets TWO messages per day:                                     │
# │  1. "avance" at 3pm MX — partial data, morning shift only             │
# │  2. "cierre" at AMALAY close — complete day, all shifts               │
# │                                                                        │
# │  Note: promedios mix brunch + cafecito turns. v2 will split by shift. │
# │                                                                        │
# │  Schedule (MX = UTC-6, no DST):                                       │
# │  ┌─────────────┬────────────┬──────────────┬──────────────────────┐   │
# │  │ Type        │ Time (MX)  │ Days (MX)    │ UTC cron             │   │
# │  ├─────────────┼────────────┼──────────────┼──────────────────────┤   │
# │  │ avance      │ 2:50pm     │ Daily        │ 50 20 * * *          │   │
# │  │ cierre      │ 10:30pm    │ Dom-Mie      │ 30 4 * * 1-4         │   │
# │  │ cierre      │ 11:30pm    │ Jue-Sab      │ 30 5 * * 0,5,6       │   │
# │  └─────────────┴────────────┴──────────────┴──────────────────────┘   │
# │                                                                        │
# │  AMALAY close times:                                                   │
# │  - Dom-Mie: 5pm close → report at 10:30pm (extra buffer for sync)    │
# │  - Jue-Sab: 11pm close → report at 11:30pm                           │
# │                                                                        │
# │  Target date = today in MX timezone. All crons fire while MX date     │
# │  is still "today" = the business day being reported.                  │
# └─────────────────────────────────────────────────────────────────────────┘

name: Wansoft Daily Mesero Report

on:
  schedule:
    - cron: '50 20 * * *'      # 2:50pm MX daily → avance
    - cron: '30 4 * * 1-4'    # 10:30pm MX Sun-Wed → cierre (moved from 8:20pm for complete data)
    - cron: '30 5 * * 0,5,6'   # 11:30pm MX Thu-Sat → cierre
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Fecha YYYY-MM-DD (default: hoy MX)'
        required: false
      report_type:
        description: 'cierre o avance'
        type: choice
        options:
          - cierre
          - avance
        default: cierre

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      WANSOFT_USER:              ${{ secrets.WANSOFT_USER }}
      WANSOFT_PASS:              ${{ secrets.WANSOFT_PASS }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
      TELEGRAM_CHAT_ID_MONICA:   ${{ secrets.TELEGRAM_CHAT_ID_MONICA }}
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Determine report type
        id: params
        run: |
          # workflow_dispatch: use input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> "$GITHUB_OUTPUT"
          # schedule "50 20 * * *" = 21:00 UTC = 3pm MX = avance
          elif [ "${{ github.event.schedule }}" = "50 20 * * *" ]; then
            echo "type=avance" >> "$GITHUB_OUTPUT"
          else
            echo "type=cierre" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "target=${{ github.event.inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            # GitHub cron delays can push a "cierre" run past midnight MX.
            # A cierre executing between 00:00-11:59 MX reports YESTERDAY's business day.
            HOUR_MX=$(TZ=America/Mexico_City date +%H)
            if [ "${{ steps.params.outputs.type }}" = "cierre" ] && [ "$HOUR_MX" -lt 12 ]; then
              echo "target=$(TZ=America/Mexico_City date -d 'yesterday' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            else
              echo "target=$(TZ=America/Mexico_City date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run mesero report pipeline
        working-directory: agents/wansoft
        run: python run.py ${{ steps.date.outputs.target }} --type=${{ steps.params.outputs.type }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wansoft-debug-${{ steps.date.outputs.target }}-${{ steps.params.outputs.type }}
          path: |
            agents/wansoft/downloads/ERROR_*.png
            agents/wansoft/downloads/page_dump_*.html
            agents/wansoft/downloads/*.xlsx
          retention-days: 7
          if-no-files-found: ignore
