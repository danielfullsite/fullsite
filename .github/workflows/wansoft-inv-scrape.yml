name: Wansoft Inventory Scrape

on:
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  CLIENT_ID: amalay

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - name: Run Inventory Scrape
        run: python .github/scripts/wansoft_inventory_scrape.py
