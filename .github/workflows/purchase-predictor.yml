name: Purchase Predictor

on:
  schedule:
    # Daily at 5pm MX (23:00 UTC) — before next-day purchasing window
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pytz
      - name: Run Purchase Predictor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
          TRIGGER_TYPE: ${{ github.event_name }}
        run: python .github/scripts/purchase_predictor.py
