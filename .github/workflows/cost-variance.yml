name: Cost Variance Agent

on:
  schedule:
    # Fridays at 9am MX (15:00 UTC)
    - cron: '0 15 * * 5'
  workflow_dispatch:

jobs:
  cost-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pytz
      - name: Run Cost Variance Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_AGENT_KEY: ${{ secrets.SUPABASE_AGENT_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_DANIEL: ${{ secrets.TELEGRAM_CHAT_ID_DANIEL }}
          TRIGGER_TYPE: ${{ github.event_name }}
        run: python .github/scripts/cost_variance_agent.py
