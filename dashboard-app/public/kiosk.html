<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fullsite POS — Kiosk</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f172a; color:#fff; font-family:system-ui,-apple-system,sans-serif; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .logo { font-size:32px; font-weight:900; letter-spacing:-0.02em; margin-bottom:8px; }
  .logo span { display:inline-block; width:8px; height:8px; background:#10b981; margin-left:2px; margin-bottom:2px; }
  .sub { color:#64748b; font-size:14px; margin-bottom:32px; }
  .btn { display:block; width:280px; padding:16px; border-radius:16px; font-size:18px; font-weight:700; text-align:center; text-decoration:none; margin-bottom:12px; transition:all 0.2s; }
  .btn:active { transform:scale(0.97); }
  .btn-pos { background:#10b981; color:#fff; }
  .btn-cocina { background:#f59e0b; color:#fff; }
  .btn-barra { background:#8b5cf6; color:#fff; }
  .btn-mesas { background:#3b82f6; color:#fff; }
  .exit { position:fixed; bottom:16px; right:16px; background:transparent; border:none; color:#334155; font-size:11px; padding:8px; }
  .footer { color:#475569; font-size:12px; margin-top:24px; }
</style>
</head>
<body>
  <div class="logo">fullsite<span></span></div>
  <p class="sub">Selecciona el modo</p>

  <a href="/pos" class="btn btn-pos">Punto de Venta</a>
  <a href="/pos/cocina" class="btn btn-cocina">Cocina</a>
  <a href="/pos/barra" class="btn btn-barra">Barra</a>
  <a href="/pos/mesas" class="btn btn-mesas">Mesas</a>

  <p class="footer">AMALAY Coffee & Market</p>

  <script>
    // Prevent back button / exit
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.go(1);
    };

    // Disable pinch zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    // Fullscreen on tap (Android)
    document.addEventListener('click', function() {
      if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function(){});
      }
    }, { once: true });
  </script>
</body>
</html>
