<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080">
    <title>Fullsite Carousel Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0b;
            --accent: #00ff88;
            --coral: #ff6b4a;
            --amber: #ffc857;
            --white: #ffffff;
            --gray: #8a8a8a;
            --dark-gray: #1a1a1b;
            --card-bg: #111112;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
        }

        .slide {
            width: 1080px;
            height: 1350px;
            background: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            overflow: hidden;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            top: 40px;
            left: 50px;
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: -0.5px;
        }

        .watermark span {
            color: var(--accent);
            opacity: 0.5;
        }

        /* Slide indicator dots */
        .dots {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .dots .dot.active {
            background: var(--white);
            width: 24px;
            border-radius: 4px;
        }

        /* Typography */
        .hook-title {
            font-size: 96px;
            font-weight: 900;
            color: var(--white);
            text-align: center;
            line-height: 1.05;
            letter-spacing: -3px;
        }

        .hook-title .accent {
            color: var(--accent);
        }

        .hook-title .coral {
            color: var(--coral);
        }

        .hook-title .amber {
            color: var(--amber);
        }

        .section-title {
            font-size: 64px;
            font-weight: 900;
            color: var(--white);
            text-align: center;
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .body-text {
            font-size: 36px;
            font-weight: 400;
            color: var(--gray);
            text-align: center;
            line-height: 1.5;
            max-width: 800px;
        }

        .number-big {
            font-size: 200px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -8px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
        }

        .card-accent {
            border-left: 4px solid var(--accent);
        }

        .card-coral {
            border-left: 4px solid var(--coral);
        }

        /* Lists */
        .item-list {
            list-style: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .item-list li {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 32px;
            color: var(--white);
            font-weight: 600;
        }

        .item-list .num {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            min-width: 60px;
        }

        /* CTA Slide */
        .cta-slide {
            text-align: center;
        }

        .logo-big {
            font-size: 120px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -4px;
        }

        .logo-big span {
            color: var(--accent);
        }

        .cta-button {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            font-size: 36px;
            font-weight: 700;
            padding: 24px 64px;
            border-radius: 16px;
            margin-top: 48px;
        }

        .handle {
            font-size: 28px;
            color: var(--gray);
            margin-top: 32px;
        }

        /* Comparison */
        .comparison {
            display: flex;
            gap: 32px;
            width: 100%;
        }

        .comparison .col {
            flex: 1;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
        }

        .comparison .col-bad {
            border-top: 4px solid var(--coral);
        }

        .comparison .col-good {
            border-top: 4px solid var(--accent);
        }

        /* Badge */
        .badge {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            font-size: 24px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .badge-coral {
            background: rgba(255, 107, 74, 0.1);
            color: var(--coral);
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 16px;
            background: var(--dark-gray);
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 8px;
        }

        /* Decorative elements */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- SLIDE 1: Hook -->
    <div class="slide">
        <div class="watermark">fullsite<span>.</span></div>
        <div class="glow" style="top: -100px; right: -100px;"></div>
        <h1 class="hook-title">
            <span class="accent">[NUMERO]</span><br>
            [TITULO DEL HOOK]
        </h1>
        <p class="body-text" style="margin-top: 32px;">[Subtitulo opcional]</p>
        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- SLIDE 2-N: Content slides -->
    <div class="slide">
        <div class="watermark">fullsite<span>.</span></div>
        <div class="grid-bg"></div>
        <h2 class="section-title">[Titulo de seccion]</h2>
        <div class="card" style="margin-top: 48px;">
            <p style="font-size: 32px; color: var(--white);">[Contenido]</p>
        </div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- LAST SLIDE: CTA -->
    <div class="slide cta-slide">
        <div class="glow" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
        <div class="logo-big">fullsite<span>.</span></div>
        <p class="body-text" style="margin-top: 16px;">POS + IA para restaurantes</p>
        <div class="cta-button">Agenda tu demo</div>
        <p class="handle">@fullsite.ia</p>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
        </div>
    </div>

</body>
</html>
